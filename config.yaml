# Marathon Auto Kill Recorder — configuration
# Edit these values; no code changes needed.

# Check GitHub for a newer version on every launch and update automatically
# (then relaunch on the fresh code). No more manual downloads.
auto_update: true

# Which game to detect. "marathon" uses the settings in this file; any other
# name loads games/<name>.yaml on top of them (made with the teach-a-game
# wizard: python main.py --teach). Profiles are shareable — PR yours.
game: "marathon"

# Each game profile can carry a theme: block (colors + display name) that
# reskins the dashboard, on-screen banners, and reel stat cards. To restyle
# Marathon itself, uncomment and edit (see games/marathon.yaml for the keys):
# theme:
#   accent: "#d3f24b"
#   danger: "#ff4d3d"

# =========================================================================
# DETECTION
#   Watches the center-screen personal reward popup that appears only when
#   YOU get a down/kill (e.g. "RUNNER DOWN +15 XP") and OCRs it. This is the
#   one approach that works for Marathon; audio + template matching were
#   tried and retired.
# =========================================================================
detection_mode: "popup"

# --- POPUP MODE settings ---
# Phrases that mean "you got a down/kill/assist". Case-insensitive, fuzzy-matched
# so OCR slips (e.g. RUNNER D0WN) still count. Add more once you see the exact
# wording for kills/assists (e.g. "ELIMINATED", "ASSIST").
popup_trigger_phrases:
  - "RUNNER DOWN"
  - "PRECISION DOWN"
  - "FINISHER"
  - "RUNNER ELIM"
popup_match_threshold: 85    # 0-100 fuzzy score to accept a phrase (higher = stricter)
popup_confirm_frames: 1      # popup must persist this many frames in a row to count.
                             # 1 = fire on the first clean read (best for CPU OCR,
                             # where a fast popup may only get one good frame).
                             # popup_cooldown_seconds guards against double-counting.
popup_absence_frames: 3      # popup must vanish this many frames before it can re-fire
popup_cooldown_seconds: 2.0  # minimum seconds between kills — stops a single popup
                             # whose OCR flickers from counting twice
# If any of these appear on screen, skip the WHOLE frame. Only use this for
# screens where you genuinely can't get a kill (death / exfil summary) — NOT
# for NPC popups, because those stack on-screen next to your real kill popups,
# and suppressing the frame would drop the real kill too. NPC popups ("UESC
# ...") are already ignored on their own: they don't match a trigger phrase.
suppress_phrases:
  - "SELF REVIVE"        # death screen
  - "GIVE UP"            # death screen
  - "RUNNER DAMAGE"      # exfil summary screen stats (in the OCR crop region)
  - "CREW REVIVES"       # exfil summary screen stats
  - "INVENTORY VALUE"    # exfil summary screen stats
# require_reward: only count a kill when a reward ("+15 XP", "+50", "+10 XP") is
# also on screen. This is the main filter against loading/menu-screen false
# positives (that text has no reward). Set false only if it misses real kills.
require_reward: true

# =========================================================================
# CAPTURE SOURCE
#   obs_virtualcam -> read OBS's Virtual Camera (recommended: OBS captures the
#                     game, we only read a webcam device -> lower anti-cheat
#                     exposure). Requires "Start Virtual Camera" in OBS.
#   screen         -> screenshot the monitor directly with mss (simpler, but our
#                     process does the screen grab).
# =========================================================================
capture_source: "screen"
obs_virtualcam_index: 0     # which webcam device is the OBS Virtual Camera (try 0,1,2)
monitor_index: 1            # only used when capture_source: screen (1 = primary)

# --- Region of the frame to OCR ---
# detect_region_frac (fractions 0-1 of the frame) is resolution-independent and
# WINS over detect_region. Set to where the RUNNER DOWN / FINISHER / RUNNER ELIM
# reward popups appear (center-lower). These values are measured from a 4K frame.
detect_region_frac:
  x: 0.375
  y: 0.71
  w: 0.19
  h: 0.12

# Legacy pixel region (used only if detect_region_frac is removed).
detect_region:
  x: 780
  y: 760
  w: 460
  h: 110

# --- Timing / performance ---
poll_fps: 5                 # frames/sec to capture + OCR. Higher = more chances to
                            # catch a fast popup with a clean read (matters on CPU
                            # OCR). Lower if it hurts game FPS.
ocr_threads: 2              # max CPU threads OCR may use (leaves cores for the game)
min_save_interval_seconds: 2.0  # floor between OBS replay saves (avoid clip spam)
kill_coalesce_seconds: 8.0  # after a kill, wait this long for more kills before
                            # saving one clip (groups down+finisher into one clip)

# --- OCR ---
# engine: "easyocr" (GPU, robust, heavier) or "tesseract" (light, needs install)
ocr_engine: "easyocr"
ocr_upscale: 3             # upscale the cropped region Nx before OCR (helps small fonts)

# --- OBS (obs-websocket v5, built into OBS 28+) ---
obs:
  host: "localhost"
  port: 4455
  password: "CHANGE_ME"       # from OBS: Tools -> WebSocket Server Settings
  counter_source: "KillCounter"  # name of the Text source in your OBS scene
  counter_format: "Kills: {count}"  # {count} is replaced with the running total
  auto_start_replay_buffer: true    # start the Replay Buffer on launch if not running
  auto_launch: true                 # if OBS itself isn't running, launch it and wait
  exe_path: ""                      # path to obs64.exe; empty = auto-find the
                                    # standard install location

# --- Kill signal (single-monitor friendly) ---
play_sound: false   # PC-side beep on each kill (off: the iPad dashboard dings
                    # instead — toggle with its SOUND button)
sound_file: ""      # optional path to a .wav to play instead of the beep, e.g.
                    # "C:\\Users\\you\\Downloads\\ding.wav"; empty = built-in beep

# --- On-screen event popup (needs the game in borderless windowed) ---
show_overlays: true                 # flash an image for special events
overlay_image: "marathon_skull.png" # the image to flash (in this folder)
overlay_size: 140                   # skull height in pixels. Try 90-200.
# Position: a named spot, OR "custom:fx,fy" where fx,fy are fractions (0-1) of
# the screen for the skull's CENTER. Default places it where you photoshopped it.
#   named: top-left | top-right | top-center | bottom-left | bottom-right |
#          bottom-center | center
# Centered ABOVE the popup text — a fixed spot beside the popup collides with
# the +XP number because popup widths vary ("PRECISION DOWN [ASSIST]" is wider).
overlay_position: "custom:0.5,0.645"
overlay_margin: 40                  # gap from screen edge (named positions only)
overlay_duration_ms: 1400           # how long it stays on screen
overlay_alpha: 1.0                  # 0-1 opacity of the floating skull (lower = fainter)
overlay_events:                     # kill texts that trigger the image
  - "PRECISION DOWN"

# Text flashes (same animation as the skull, all click-through):
overlay_multikill: true    # "DOUBLE KILL" / "TRIPLE KILL" when kills land together
overlay_clip_saved: true   # small "CLIP SAVED" bottom-right when a clip lands
overlay_reel_ready: true   # "HIGHLIGHTS READY" when the match reel finishes

# Halo-style announcer VOICE shouting "Double kill!" etc. when kills land
# together (uses announcer_voice; rendered once per voice, then works offline).
# NOTE: a down + its finisher is ONE kill — multikills need multiple DOWNS.
announcer_medals: true

# TEAM WIPE banner + call-out: three distinct enemy deaths (elim/finisher
# popups, yours or assists) within ~2 minutes — in trios that's the squad.
team_wipe: true
team_wipe_size: 3      # deaths that make a wipe (2 for duos)

# --- Clips + recap ---
organize_clips: true   # rename each saved clip by event+time and sort into a
                       # per-session folder ("Marathon Sessions/<date_time>/")
make_card: true        # at session end, save a shareable match-card PNG to stats/cards/
make_montage: true     # at session end, stitch the session's clips into one
                       # highlight reel (needs ffmpeg)
make_shorts: true      # at session end, render each clip as a 1080x1920 vertical
                       # (blurred background + centered gameplay) ready for
                       # YouTube Shorts/TikTok -> session folder /shorts/
shorts_labels: true    # bake "KILL #3 - FINISHER" text into each short
ffmpeg_path: ""        # leave empty to auto-find ffmpeg.exe in this folder / PATH

# --- Kill feed name tracking (the Menace Report) ---
# Read gamertags off the kill feed: who you downed (scanned right after each
# kill popup) and who downed you (scanned on the downed screen). Logged with
# timestamps to stats/encounters.csv; the Stats page shows most-downed
# opponents with "last downed", plus your nemeses. Set gamertag to your EXACT
# in-game name so the feed lines can be matched.
track_names: true
gamertag: "MRVIZNASTY"

# Streamer watchlist: gamertags that get the BIG alert when they show up in
# your kill feed — on-screen banner, voiced call-out, and if one of them
# downs YOU the clip is saved automatically (your kills are clipped anyway).
# Fuzzy-matched, so OCR slips still hit. Needs track_names: true.
streamer_watchlist:
  - "MARSHYY"
  - "SERAPHMAXYT"
watchlist_clip_deaths: true

# At match end, when the EXFILTRATED summary screen appears, grab it once and
# log the real match stats (elims/downs/damage/run time) to stats/match_stats.csv
# — and print an audit: game's kill count vs what we detected.
capture_exfil_stats: true

# In trios/duos, the exfil screen shows every player's panel — parse teammates
# too (names + stats -> stats/squad_stats.csv). Powers the squad leaderboard
# and buddy economy tracking on the dashboard's Stats page.
squad_stats: true

# Detect which runner/shell you're playing (one full-frame scan when the
# deployment screen appears). Feeds per-runner stats and the announcer
# ("...on Glitch, drops four kills").
runner_detection: true

# After each match's exfil, build an ESPN-style highlight reel (stat title card
# + that match's clips) into <session>/reels/ and pop it up on the iPad
# dashboard for instant rewatching.
make_match_reels: true

# Announcer voice for the "(announced)" reel. Human-sounding Microsoft neural
# voice (needs internet while the reel builds; falls back to the offline
# robotic voice without it). Try en-US-ChristopherNeural, en-GB-RyanNeural...
# Full list: .venv\Scripts\python -m edge_tts --list-voices
announcer_voice: "en-US-ChristopherNeural"
# Deepen any voice; "-18Hz" on Christopher = the deep broadcast voice.
announcer_pitch: "-18Hz"
# How the announcer says your name (phonetic). Empty = "our runner".
announcer_player_name: "Mister Viz Nasty"
reel_music_volume: 0.08   # 0-1 loudness of the music bed under the game audio
                          # (0.08 = quiet background; 0 = off, 0.22 = old level)

# At session end, build ONE reel of the whole session's clips (title card +
# Play of the Game) -> <session>/session_reel.mp4
make_session_reel: true

# --- YouTube auto-upload (one-time setup required; see README) ---
# When true, the session_reel is uploaded to YouTube at session end. Needs
# client_secret.json in this folder (from Google Cloud) + the google upload
# libraries installed. Leave false until you've done the setup.
youtube_upload_session_reel: false
youtube_privacy: "unlisted"   # unlisted | private | public

# --- Live web dashboard (view on a phone/iPad browser over the LAN) ---
web_dashboard: true    # serve a live kill feed page
web_port: 8000         # open http://<your-PC-IP>:8000 on the device
web_lan: true          # true = reachable from devices on your Wi-Fi (the iPad).
                       # NOTE: the dashboard has no password — anyone on the same
                       # network can see stats and press its buttons. On a home
                       # network that's fine; on shared/public Wi-Fi set false
                       # (this PC only).

# --- Logging ---
session_log: "session_log.csv"
