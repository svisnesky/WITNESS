# Marathon Auto Kill Recorder — configuration
# Edit these values; no code changes needed.

# =========================================================================
# DETECTION MODE
#   popup    -> (recommended) watch the center-screen personal confirmation
#               popup that appears only when YOU get a down, e.g.
#               "RUNNER DOWN  +15 XP". No name matching needed.
#   killfeed -> parse the bottom kill feed "<killer> <verb> <victim>" and match
#               your name. Only useful if the feed uses a real word (Marathon's
#               feed uses icons, so popup mode is preferred).
# =========================================================================
detection_mode: "popup"

# --- POPUP MODE settings ---
# Phrases that mean "you got a down/kill/assist". Case-insensitive, fuzzy-matched
# so OCR slips (e.g. RUNNER D0WN) still count. Add more once you see the exact
# wording for kills/assists (e.g. "ELIMINATED", "ASSIST").
popup_trigger_phrases:
  - "RUNNER DOWN"
  - "PRECISION DOWN"
  - "FINISHER"
  - "RUNNER ELIM"
popup_match_threshold: 80    # 0-100 fuzzy score to accept a phrase
popup_absence_frames: 2      # popup must vanish this many frames before it can re-fire
# If any of these appear on screen, skip detection (you're downed / can't get
# kills) so the death UI + lingering feed text don't count as a false kill.
suppress_phrases:
  - "SELF REVIVE"
  - "GIVE UP"
# require_xp_reward: only fire if a "+NN XP" reward is also visible in the region.
# Guards against non-combat popups, but set false if it causes missed kills.
require_xp_reward: false

# --- KILLFEED MODE settings (only used when detection_mode: killfeed) ---
player_name: "MRVIZNASTY"    # your exact in-game display name
name_aliases:
  - "MRVIZNASTY"
match_mode: "self_or_assist" # self_or_assist | self_only
trigger_keywords:
  - "downed"
name_match_threshold: 82

# =========================================================================
# CAPTURE SOURCE
#   obs_virtualcam -> read OBS's Virtual Camera (recommended: OBS captures the
#                     game, we only read a webcam device -> lower anti-cheat
#                     exposure). Requires "Start Virtual Camera" in OBS.
#   screen         -> screenshot the monitor directly with mss (simpler, but our
#                     process does the screen grab).
# =========================================================================
capture_source: "obs_virtualcam"
obs_virtualcam_index: 0     # which webcam device is the OBS Virtual Camera (try 0,1,2)
monitor_index: 1            # only used when capture_source: screen (1 = primary)

# --- Region of the frame to OCR (set by calibrate.py) ---
# In popup mode: the box around the center "RUNNER DOWN +XP" popup.
# In killfeed mode: the box around the kill feed.
# Calibrate against the SAME capture_source you'll run with.
detect_region:
  x: 780
  y: 760
  w: 460
  h: 110

# --- Timing ---
poll_fps: 6                 # frames/sec to capture + OCR
dedup_ttl_seconds: 8.0      # killfeed mode: remember a matched line this long
min_save_interval_seconds: 2.0  # floor between OBS replay saves (avoid clip spam)

# --- OCR ---
# engine: "easyocr" (GPU, robust, heavier) or "tesseract" (light, needs install)
ocr_engine: "easyocr"
ocr_upscale: 3             # upscale the cropped region Nx before OCR (helps small fonts)

# --- OBS (obs-websocket v5, built into OBS 28+) ---
obs:
  host: "localhost"
  port: 4455
  password: "CHANGE_ME"       # from OBS: Tools -> WebSocket Server Settings
  counter_source: "KillCounter"  # name of the Text source in your OBS scene
  counter_format: "Kills: {count}"  # {count} is replaced with the running total
  auto_start_replay_buffer: true    # start the Replay Buffer on launch if not running

# --- Kill signal (single-monitor friendly) ---
play_sound: true    # play a short beep each time a kill is detected
sound_file: ""      # optional path to a .wav to play instead of the beep, e.g.
                    # "C:\\Users\\you\\Downloads\\ding.wav"; empty = built-in beep

# --- On-screen event popup (needs the game in borderless windowed) ---
show_overlays: true                 # flash an image for special events
overlay_image: "marathon_skull.png" # the image to flash (in this folder)
overlay_size: 140                   # skull height in pixels. Try 90-200.
# Position: a named spot, OR "custom:fx,fy" where fx,fy are fractions (0-1) of
# the screen for the skull's CENTER. Default places it where you photoshopped it.
#   named: top-left | top-right | top-center | bottom-left | bottom-right |
#          bottom-center | center
overlay_position: "custom:0.542,0.696"
overlay_margin: 40                  # gap from screen edge (named positions only)
overlay_duration_ms: 1400           # how long it stays on screen
overlay_alpha: 1.0                  # 0-1 opacity of the floating skull (lower = fainter)
overlay_events:                     # kill texts that trigger the image
  - "PRECISION DOWN"

# --- Clips + recap ---
organize_clips: true   # rename each saved clip by event+time and sort into a
                       # per-session folder ("Marathon Sessions/<date_time>/")

# --- Logging ---
session_log: "session_log.csv"
